name: ci
on:
  push:
    branches: [main, master, 'feat/**']
  pull_request:

jobs:
  # Green core: runs on Linux (no display server needed — the testable core is
  # deliberately Electron-free). Fast gate for every push.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:vkmap   # native VK header must match app/platform/vk-map.json
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test -- --coverage

  # Windows native lane (slice 1.8): build the addon, then run the full test
  # suite — the native smoke test (tests/native/windows-bridge.smoke.test.ts)
  # auto-runs here (and auto-skips in `core`), exercising the export-surface
  # assertion, the moveCursor round-trip, and the native VK guard for real.
  native-windows:
    needs: core
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:native:win   # runs gen:vkmap, then node-gyp rebuild
      - run: npm run test               # native smoke test runs for real here (win32)
      - run: npm run test:e2e           # includes the real-input assist e2e (1.8)

  # macOS native lane: stub until slice 2.1 lands the macOS addon.
  native-macos:
    needs: core
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # - run: npm run build:native:mac  # enable in slice 2.1

  # Playwright-Electron e2e (mock bridge): asserts runtime properties jsdom/unit
  # tests structurally cannot (click-through, real renderer isolation, CSP
  # enforcement, cursor mirroring). Runs against the mock bridge everywhere —
  # native-windows above is the lane that exercises real OS input.
  e2e:
    needs: core
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:e2e
